<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #080808;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        .logo {
            width: 220px; 
            margin-bottom: 2rem;
        }

        .coming-soon {
            /* Switched to Inter with a heavy weight */
            font-family: 'Inter', sans-serif;
            font-weight: 900; 
            font-size: 2 rem;
            color: #f5f5f5;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: 10px; /* Tighter spacing looks more modern/editorial */
            
           
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin-top: 1.5rem;
            letter-spacing: 0.5px;
        }

        .logo-placeholder {
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
            border: 2px solid #333;
            padding: 10px 20px;
            display: inline-block;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <img src="logo.png" alt="Brand Logo" class="logo" onerror="this.style.display='none'; document.getElementById('alt-logo').style.display='inline-block';">
        </div>

        <h1 class="coming-soon">Coming Soon</h1>
        
    </div>

</body>
</html>
